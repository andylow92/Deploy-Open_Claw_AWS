name: Terraform Policy CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  policy-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Install conftest
        env:
          CONFTEST_VERSION: "0.58.0"
          # TODO: populate CONFTEST_SHA256 with the upstream checksum from
          # https://github.com/open-policy-agent/conftest/releases/tag/v0.58.0
          # and uncomment the `sha256sum -c -` line below to enforce supply-chain integrity.
          CONFTEST_SHA256: ""
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" -o conftest.tar.gz
          if [ -n "${CONFTEST_SHA256}" ]; then
            echo "${CONFTEST_SHA256}  conftest.tar.gz" | sha256sum -c -
          fi
          tar -xzf conftest.tar.gz conftest
          sudo mv conftest /usr/local/bin/conftest
          conftest --version

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan to JSON
        run: |
          terraform plan -input=false -lock=false -out=tfplan.binary
          terraform show -json tfplan.binary > tfplan.json

      - name: Conftest policy checks
        run: conftest test tfplan.json --policy ../policy/conftest/policy --output table

      - name: tfsec (blocking)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false

      - name: Checkov (blocking)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          soft_fail: false
          quiet: true
