name: Terraform Policy CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  policy-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Install conftest
        run: |
          curl -sSL https://github.com/open-policy-agent/conftest/releases/download/v0.58.0/conftest_0.58.0_Linux_x86_64.tar.gz -o conftest.tar.gz
          tar -xzf conftest.tar.gz conftest
          sudo mv conftest /usr/local/bin/conftest
          conftest --version

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan to JSON
        run: |
          terraform plan -input=false -lock=false -out=tfplan.binary
          terraform show -json tfplan.binary > tfplan.json

      - name: Conftest policy checks
        run: conftest test tfplan.json --policy ../policy/conftest/policy --output table

      - name: Optional tfsec
        continue-on-error: true
        run: |
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
          ./bin/tfsec --no-color

      - name: Optional checkov
        continue-on-error: true
        run: |
          python3 -m pip install --user checkov
          ~/.local/bin/checkov -d .
