---
- name: Ensure Ollama install dependencies are present
  ansible.builtin.apt:
    name:
      - curl
    state: present
    update_cache: true

- name: Check whether Ollama binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/ollama
  register: ollama_binary_stat

- name: Check installed Ollama version
  ansible.builtin.command:
    cmd: /usr/local/bin/ollama --version
  register: ollama_version_check
  changed_when: false
  when: ollama_binary_stat.stat.exists

- name: Install or update pinned Ollama version
  ansible.builtin.shell: |
    set -o pipefail
    OLLAMA_VERSION="{{ ollama_version }}" curl -fsSL https://ollama.com/install.sh | sh
  args:
    executable: /bin/bash
  when: not ollama_binary_stat.stat.exists or (ollama_version_check.stdout | regex_search('[0-9]+\\.[0-9]+\\.[0-9]+')) != ollama_version

- name: Ensure Ollama systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/{{ ollama_service_name }}.service.d
    state: directory
    mode: "0755"

- name: Configure Ollama bind address override
  ansible.builtin.copy:
    dest: /etc/systemd/system/{{ ollama_service_name }}.service.d/override.conf
    mode: "0644"
    content: |
      [Service]
      Environment="OLLAMA_HOST={{ ollama_bind_host }}:{{ ollama_bind_port }}"
  notify: Restart ollama

- name: Ensure Ollama service is enabled and started
  ansible.builtin.systemd:
    name: "{{ ollama_service_name }}"
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for Ollama TCP port
  ansible.builtin.wait_for:
    host: "{{ ollama_bind_host }}"
    port: "{{ ollama_bind_port }}"
    timeout: 60

- name: Wait for Ollama API health check
  ansible.builtin.uri:
    url: "{{ ollama_healthcheck_scheme }}://{{ ollama_bind_host }}:{{ ollama_bind_port }}{{ ollama_healthcheck_path }}"
    method: GET
    status_code: 200
  register: ollama_healthcheck
  retries: 20
  delay: 3
  until: ollama_healthcheck.status == 200

- name: Check whether required Ollama models are already present
  ansible.builtin.command:
    cmd: /usr/local/bin/ollama show {{ item }}
  loop: "{{ ollama_models }}"
  register: ollama_model_checks
  changed_when: false
  failed_when: false

- name: Pull required Ollama models
  ansible.builtin.command:
    cmd: /usr/local/bin/ollama pull {{ item.item }}
  loop: "{{ ollama_model_checks.results }}"
  when: item.rc != 0
