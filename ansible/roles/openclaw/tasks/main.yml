---
- name: Ensure OpenClaw dependencies are installed
  ansible.builtin.apt:
    name:
      - git
      - make
    state: present
    update_cache: true

- name: Clone OpenClaw repository
  ansible.builtin.git:
    repo: "{{ openclaw_repo_url }}"
    dest: "{{ openclaw_install_dir }}"
    version: "{{ openclaw_repo_ref }}"
    update: true

- name: Render OpenClaw environment file
  ansible.builtin.copy:
    dest: "{{ openclaw_install_dir }}/.env"
    mode: "0600"
    content: |
      OLLAMA_BASE_URL={{ openclaw_ollama_endpoint }}
      {% for key, value in openclaw_env.items() %}
      {{ key }}={{ value }}
      {% endfor %}
  notify: Restart openclaw

- name: Deploy OpenClaw via Docker Compose
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ openclaw_install_dir }}"
  register: openclaw_compose_up
  changed_when:
    - "'Creating' in openclaw_compose_up.stdout or 'Recreating' in openclaw_compose_up.stdout or 'Starting' in openclaw_compose_up.stdout or 'Building' in openclaw_compose_up.stdout"
  when: openclaw_run_with_docker

- name: Create OpenClaw systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/{{ openclaw_service_name }}.service
    mode: "0644"
    content: |
      [Unit]
      Description=OpenClaw service
      After=network-online.target docker.service
      Wants=network-online.target

      [Service]
      Type=oneshot
      WorkingDirectory={{ openclaw_install_dir }}
      EnvironmentFile={{ openclaw_install_dir }}/.env
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down
      RemainAfterExit=true

      [Install]
      WantedBy=multi-user.target
  when: openclaw_run_with_docker
  notify: Restart openclaw

- name: Enable OpenClaw service
  ansible.builtin.systemd:
    name: "{{ openclaw_service_name }}"
    state: started
    enabled: true
    daemon_reload: true
  when: openclaw_run_with_docker

- name: Wait for OpenClaw health endpoint
  ansible.builtin.uri:
    url: "{{ openclaw_healthcheck_url }}"
    method: GET
    status_code: 200
  register: openclaw_healthcheck
  retries: 20
  delay: 3
  until: openclaw_healthcheck.status == 200
  when: openclaw_run_with_docker
