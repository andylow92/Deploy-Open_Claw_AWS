---
- name: Ensure OpenClaw dependencies are installed
  ansible.builtin.apt:
    name:
      - git
      - make
    state: present
    update_cache: true

- name: Clone OpenClaw repository
  ansible.builtin.git:
    repo: "{{ openclaw_repo_url }}"
    dest: "{{ openclaw_install_dir }}"
    version: main
    update: true

- name: Render OpenClaw environment file
  ansible.builtin.copy:
    dest: "{{ openclaw_install_dir }}/.env"
    mode: "0600"
    content: |
      {% for key, value in openclaw_env.items() %}
      {{ key }}={{ value }}
      {% endfor %}

- name: Deploy OpenClaw via Docker Compose
  ansible.builtin.command:
    cmd: docker compose up -d --build
    chdir: "{{ openclaw_install_dir }}"
  when: openclaw_run_with_docker

- name: Create OpenClaw systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/{{ openclaw_service_name }}.service
    mode: "0644"
    content: |
      [Unit]
      Description=OpenClaw service
      After=network-online.target docker.service
      Wants=network-online.target

      [Service]
      Type=oneshot
      WorkingDirectory={{ openclaw_install_dir }}
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down
      RemainAfterExit=true

      [Install]
      WantedBy=multi-user.target
  when: openclaw_run_with_docker
  notify: Restart openclaw

- name: Enable OpenClaw service
  ansible.builtin.systemd:
    name: "{{ openclaw_service_name }}"
    enabled: true
    daemon_reload: true
  when: openclaw_run_with_docker
